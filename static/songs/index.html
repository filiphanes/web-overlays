<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1, user-scalable=no, shrink-to-fit=no, viewport-fit=cover"/>
<meta name="HandheldFriendly" content="true" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<title>Songs controller</title>

<style>
:root { --dark: #222; }
html, body { height: 100%; }
body {
  color: white;
  background: black;
  margin: 0;
  max-height: 100vh;
  overflow: hidden;
  user-select: none;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen-Sans, Ubuntu, Cantarell, "Helvetica Neue", sans-serif;
}

/* ---- form controls (bootstrap-darkly stand-ins, so no external CSS needed) ---- */
.btn, .form-control {
  font-size: 1rem;
  line-height: 1.5;
  padding: .375rem .5rem;
  border-radius: .25rem;
  border: 1px solid transparent;
  box-sizing: border-box;
}
.btn { cursor: pointer; user-select: none; background: #444; color: #fff; }
.btn:disabled { opacity: .5; cursor: default; }
.btn-primary   { background: #375a7f; }
.btn-secondary { background: #444; }
.btn-success   { background: #00bc8c; }
.btn-danger    { background: #e74c3c; }
.form-control  { background: #222; color: #fff; border-color: #555; }
.form-control::placeholder { color: #999; }
.btn-group { display: inline-flex; width: 100%; }
.btn-group > * { border-radius: 0; }
.btn-group > :first-child { border-radius: .25rem 0 0 .25rem; }
.btn-group > :last-child  { border-radius: 0 .25rem .25rem 0; }
.control-button { min-width: 6rem; }

/* ---- top filter bar (in normal flow, anchors the absolute panels below it) ---- */
.input-group { width: 100%; display: flex; }
.input-group .form-control { flex: 1 1 auto; }
.input-group .btn { flex: 0 0 auto; max-width: 2.5rem; }

/* ---- sliding panels (mobile: one at a time) ---- */
.settings, .songs-filter, .songs-control {
  display: block;
  margin: 0;
  padding: 0;
  width: 100%;
  max-height: calc(100vh - 5.75rem);
  position: absolute;
  left: -100%;
  overflow: auto;
  z-index: 30;
  transition: left .2s ease;
}
.settings.show, .songs-filter.show, .songs-control.show { left: 0; }
.settings { padding: 1rem; background: var(--dark); }

/* ---- song rows (shared by filter list + playlist) ---- */
.song-item {
  width: 100%;
  margin: 0;
  text-align: left;
  border-bottom: 1px solid #555;
  background: #222;
}
.song-item:hover { border-color: #9d7108; }
.song-set   { flex: 1 1 auto; text-align: left; }
.song-add, .song-edit, .song-remove { flex: 0 0 auto; max-width: 2.5rem; }

/* ---- playlist ---- */
.playlist { display: block; overflow: visible; width: 100%; margin: 0 0 .5rem; }
.playlist .empty { padding: 1rem; color: #999; }

/* ---- current-song info bar + verse editor ---- */
.info-bar { width: 100%; }
.info-bar .form-control { vertical-align: middle; width: auto; max-width: 9rem; margin: .125rem; }
.song-title { padding: .25rem .5rem; }
.song-create { float: right; }

.verses { display: block; overflow: auto; width: 100%; padding-bottom: 4rem; }
.verse-item {
  border-bottom: 1px solid #3c3b3b;
  padding: .5rem;
  margin: 0;
  width: 100%;
  white-space: pre;
  cursor: pointer;
}
.verse-item:hover { border-color: wheat; }
.verse-item.active { border-color: yellow; color: #fff; background: #375a7f; }
.verse-item:last-child { border-bottom: none; }

p[contenteditable="true"] {
  background: #fff;
  color: #000;
  min-height: 3rem;
  max-width: calc(100% - 4rem);
  padding: .5rem;
  margin: 0;
  white-space: pre;
  user-select: text;
}
p[contenteditable="true"]:focus-within { background: lightyellow; }
.verse-id       { float: right; padding: .5rem; color: #aaa; }
.verse-new-id   { float: right; width: 3rem; }
.verse-new-item { min-height: 3rem; }
.verse-add, .verse-remove { float: right; }

/* ---- bottom navigation ---- */
.bottom-buttons { position: absolute; bottom: 0; left: 0; width: 100%; display: flex; }
.bottom-buttons .btn { margin: 0; padding: 1rem .25rem; flex: 1 1 0; border-radius: 0; }

/* ---- desktop: filter + control side by side, settings slides from the right ---- */
@media screen and (min-width: 640px) {
  .songs-filter, .songs-control {
    display: inline-block;
    position: static;
    left: 0;
    width: 30rem;
    max-height: calc(100vh - 5.75rem);
    vertical-align: top;
  }
  .songs-control { max-width: 60rem; }
  .playlist  { display: inline-block; max-width: 20rem; vertical-align: top; }
  .info-bar  { display: inline-block; vertical-align: top; max-width: 20rem; }
  .verses    { display: inline-block; width: 30rem; vertical-align: top; }
  .settings.show { width: 30rem; left: auto; right: 0; }
}
</style>

<script type="module">
import van from "../js/van.js";
import { multiBrokerState } from "../js/broker.js";
import { live, boundSelect } from "../js/ui.js";

const { div, span, p, input, button, label, br, strong } = van.tags;

/* ════════════════════════════════════════════════════════════════
   State
   ════════════════════════════════════════════════════════════════ */

// Broadcast (synced) scalar keys, stored on the gun room node
// gun.get('songs').get(<room>).{show,line1,bodyclass,curSongIndex,curVerseIndex}
const s = multiBrokerState({
  show: false,
  line1: "",
  bodyclass: "",
  curSongIndex: 0,
  curVerseIndex: 0,
});

// Local UI state
const songsState    = van.state({});   // soul -> song data
const playlistState = van.state([]);   // resolved song data, indexed
const versesState   = van.state([]);   // current song's verse strings
const songFilter    = van.state("");
const filterOpen    = van.state(false);
const settingsOpen  = van.state(false);
const editing       = van.state(false);
const editingSong   = van.state(null);
const editorVersion = van.state(0);    // bump to rebuild the verse editor

// Filled in by main() after the gun connection is open
let gunRoot, playlistNode;

const EMPTY_SONG = { title: "", author: "", order: "", verses: {} };
const soul = song => song && window.Gun?.node.soul(song);

/* ════════════════════════════════════════════════════════════════
   Derived state
   ════════════════════════════════════════════════════════════════ */

const songsList = van.derive(() =>
  Object.values(songsState.val)
    .filter(song => song && song.title != null && soul(song))
    .sort(naturalTitleSort));

const filteredSongs = van.derive(() => {
  const f = songFilter.val;
  return f ? songsList.val.filter(matchesSong) : songsList.val;
});

const curSong = van.derive(() => playlistState.val[s.curSongIndex] || EMPTY_SONG);
const curSoul = van.derive(() => soul(curSong.val));

/* ════════════════════════════════════════════════════════════════
   Pure helpers
   ════════════════════════════════════════════════════════════════ */

const ASCII = s => (s || "").normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase();

// "Psalm 23" sorts after "Psalm 9" by zero-padding runs of digits.
function sortKey(title) {
  return (title || "").replace(/\d+/g, n => n.padStart(4, "0")).toLowerCase();
}
function naturalTitleSort(a, b) {
  const ka = sortKey(a.title), kb = sortKey(b.title);
  return ka < kb ? -1 : ka > kb ? 1 : 0;
}

function matchesSong(song) {
  const title  = ASCII(song.title);
  const prefix = ASCII(songFilter.val);
  return title.startsWith(prefix) || (prefix.length >= 2 && title.includes(" " + prefix));
}

// Keep only real verse strings from a gun verses node (drops `_` metadata,
// `>` state map, and null/tombstone entries).
function pickStringVerses(raw) {
  if (!raw) return {};
  const out = {};
  for (const [k, v] of Object.entries(raw)) {
    if (k !== "_" && v != null && typeof v !== "object") out[k] = v;
  }
  return out;
}

// Order verses by song.order ("v1 c1 v2"), otherwise by id.
function orderedVerses(song, raw) {
  if (!raw) return [];
  const order = (song.order || "").trim();
  if (order) {
    return order.split(/\s+/).map(id => raw[id]).filter(v => v != null && typeof v !== "object");
  }
  return Object.entries(pickStringVerses(raw))
    .sort(([a], [b]) => a.localeCompare(b))
    .map(([, v]) => v);
}

// Next free verse id suggestion (v1, v2, ...), skipping ids already taken.
function nextVerseId(taken) {
  let n = 1, id = "v1";
  while (taken && taken[id]) id = "v" + ++n;
  return id;
}

/* ════════════════════════════════════════════════════════════════
   Gun collections (songs + playlist) — live subscriptions
   ════════════════════════════════════════════════════════════════ */

function subscribeSongs() {
  // root.map() yields every child of the room node; we keep only real song
  // nodes (they carry a soul) and skip the scalar keys + the "playlist" node.
  gunRoot.map().on((data, key) => {
    if (key === "playlist") return;
    if (data == null) {
      if (songsState.val[key]) songsState.val = omit(songsState.val, key);
      return;
    }
    if (!soul(data)) return;             // primitives (show, line1, ...) — not songs
    songsState.val = { ...songsState.val, [key]: data };
  });
}

function subscribePlaylist() {
  playlistNode.map().on((data, key) => {
    const i = Number(key);
    if (Number.isNaN(i)) return;
    if (data == null) {
      // gun stays contiguous, but stay robust against transient holes
      if (i < playlistState.val.length)
        playlistState.val = playlistState.val.filter((_, idx) => idx !== i);
      return;
    }
    const next = playlistState.val.slice();
    next[i] = data;
    playlistState.val = next;
  });
}

const omit = (obj, key) => {
  const next = { ...obj };
  delete next[key];
  return next;
};

/* ════════════════════════════════════════════════════════════════
   Effects
   ════════════════════════════════════════════════════════════════ */

// Broadcast the current verse text so overlay.html can show it.
van.derive(() => { s.line1 = versesState.val[s.curVerseIndex] || ""; });

// Load the current song's verses (async gun read); guarded against races.
let versesToken = 0;
van.derive(() => loadVerses(curSong.val));

function loadVerses(song) {
  const token = ++versesToken;
  const id = soul(song);
  if (!id || !gunRoot) { if (token === versesToken) versesState.val = []; return; }
  gunRoot.get(id).get("verses").once(raw => {
    if (token !== versesToken) return;
    versesState.val = orderedVerses(song, raw);
  });
}

/* ════════════════════════════════════════════════════════════════
   Mutators — playlist
   ════════════════════════════════════════════════════════════════ */

function addToPlaylist(song) {
  const id = soul(song);
  if (!id) return;
  // store a soul reference so overlay/stage resolve the full song + verses
  playlistNode.get(playlistState.val.length).put(gunRoot.get(id));
  filterOpen.val = false;
}

function removePlaylistItem(i) {
  const pl = playlistState.val;
  if (i < s.curSongIndex) s.curSongIndex = s.curSongIndex - 1;
  // shift the tail down by one, then drop the now-duplicate last slot
  for (let j = i + 1; j < pl.length; j++) {
    const id = soul(pl[j]);
    if (id) playlistNode.get(j - 1).put(gunRoot.get(id));
  }
  playlistNode.get(pl.length - 1).put(null);
}

/* ════════════════════════════════════════════════════════════════
   Mutators — song CRUD
   ════════════════════════════════════════════════════════════════ */

function cleanSong(song) {
  return {
    title: song.title || "",
    author: song.author || "",
    order: song.order || "",
    verses: pickStringVerses(song.verses),
  };
}

function newSong() {
  editingSong.val = { ...EMPTY_SONG, verses: {} };
  newIdInput.value = "v1";
  editing.val = true;
  editorVersion.val++;
}

function editCurrent() {
  if (editing.val) saveEdit();
  else startEdit(curSong.val);
}

function startEdit(song) {
  const id = soul(song);
  if (!id) { newSong(); return; }
  gunRoot.get(id).get("verses").once(raw => {
    editingSong.val = {
      title: song.title || "", author: song.author || "", order: song.order || "",
      verses: pickStringVerses(raw),
    };
    newIdInput.value = nextVerseId(editingSong.val.verses);
    editing.val = true;
    editorVersion.val++;
  });
}

function cancelEdit() {
  editing.val = false;
  editorVersion.val++;
}

function saveEdit() {
  const song = editingSong.val;
  editing.val = false;
  editorVersion.val++;
  if (!song) return;
  const data = cleanSong(song);
  const id = soul(song);
  if (id) gunRoot.get(id).put(data);     // update existing
  else gunRoot.set(data);                // create new
}

function removeSong(song) {
  const id = soul(song);
  if (id) gunRoot.get(id).put(null);     // tombstone; subscription drops it from the list
}

function removeEditingSong() {
  const song = editingSong.val;
  editing.val = false;
  editorVersion.val++;
  removeSong(song);
}

function addNewVerse() {
  const song = editingSong.val;
  if (!song) return;
  song.verses ??= {};
  const id = newIdInput.value.trim() || nextVerseId(song.verses);
  const html = newVerseNode.innerHTML;
  if (!html) return;
  song.verses[id] = html;
  newVerseNode.innerHTML = "";
  newIdInput.value = nextVerseId({ ...song.verses, [id]: html });
  editorVersion.val++;
}

function removeVerse(id) {
  const song = editingSong.val;
  if (!song?.verses) return;
  song.verses[id] = null;
  editorVersion.val++;
}

// Import OpenLyrics XML (from OpenLP) as new songs.
function importSongs(e) {
  for (const file of e.target.files) {
    const reader = new FileReader();
    reader.onload = ev => {
      const dom = new DOMParser().parseFromString(ev.target.result, "application/xml");
      if (dom.documentElement.nodeName === "parsererror") {
        console.warn("import: parse error in", file.name, dom);
        return;
      }
      const q = sel => dom.querySelector(sel);
      const song = {
        title: q("song properties title")?.innerHTML || "",
        author: q("song properties author")?.innerHTML || "",
        order: q("song properties verseOrder")?.innerHTML || "",
        verses: {},
      };
      dom.querySelectorAll("song lyrics verse").forEach(v => {
        const lines = v.querySelector("lines");
        song.verses[v.getAttribute("name")] = lines ? lines.innerHTML.replace(/<br[^>]*>/g, "\n") : "";
      });
      gunRoot.set(song);
    };
    reader.readAsText(file);
  }
}

/* ════════════════════════════════════════════════════════════════
   Keyboard shortcuts
   ════════════════════════════════════════════════════════════════ */

document.addEventListener("keydown", e => {
  if (editing.val) {
    if (e.code === "Enter" && e.ctrlKey) addNewVerse();
    return;
  }
  const lastVerse = versesState.val.length - 1;
  const lastSong  = playlistState.val.length - 1;
  switch (e.code) {
    case "ArrowDown":  s.curVerseIndex = Math.min(s.curVerseIndex + 1, Math.max(0, lastVerse)); break;
    case "ArrowUp":    s.curVerseIndex = Math.max(s.curVerseIndex - 1, 0); break;
    case "ArrowLeft":  s.curSongIndex  = Math.max(s.curSongIndex - 1, 0); s.curVerseIndex = 0; break;
    case "ArrowRight": s.curSongIndex  = Math.min(s.curSongIndex + 1, Math.max(0, lastSong)); s.curVerseIndex = 0; break;
    case "Enter":      s.show = !s.show; return;
    default: return;
  }
  e.preventDefault();
  scrollToVerse(s.curVerseIndex);
});

function scrollToVerse(i) {
  const item = document.querySelector(".verses")?.children[i];
  item?.scrollIntoView({ block: "nearest" });
}

const toggleShow = () => s.show = !s.show;

/* ════════════════════════════════════════════════════════════════
   Components
   ════════════════════════════════════════════════════════════════ */

// contenteditable <p> bound to editingSong.verses[id]; uncontrolled so the
// caret never jumps on input (we only ever read it back into the model).
function editableVerseP(id, html) {
  const el = p({
    class: "verse-item",
    contenteditable: "true",
    oninput: e => { if (editingSong.val?.verses) editingSong.val.verses[id] = e.target.innerHTML; },
  });
  el.innerHTML = html || "";
  return el;
}

// one shared node for the "new verse" editor (persists across re-renders;
// uncontrolled so the caret never jumps on input)
const newVerseNode = p({ class: "verse-item verse-new-item", contenteditable: "true" });
const newIdInput = input({ class: "form-control verse-new-id", type: "text", placeholder: "id" });

function songRow(song) {
  const isCurrent = () => soul(song) === curSoul.val;
  return div({ class: "song-item btn-group" },
    button({
      class: () => "btn song-set" + (isCurrent() ? " btn-primary" : ""),
      title: "Pridať do playlistu",
      onclick: () => { addToPlaylist(song); filterOpen.val = false; },
    }, song.title || "(bez názvu)"),
    button({ class: "btn btn-success song-add", title: "Pridať do playlistu",
             onclick: () => addToPlaylist(song) }, "+"),
    button({ class: "btn btn-secondary song-edit", title: "Upraviť",
             onclick: () => { startEdit(song); filterOpen.val = false; } }, "✎"),
    button({ class: "btn btn-secondary song-remove", title: "Odstrániť",
             onclick: () => removeSong(song) }, "🗑"),
  );
}

function playlistRows() {
  const pl = playlistState.val;
  if (!pl.length) return div({ class: "empty" }, "Playlist je prázdny, pridajte piesne z filtra.");
  return pl.map((song, i) =>
    div({ class: "song-item btn-group" },
      button({
        class: () => "btn song-set" + (s.curSongIndex === i ? " btn-primary" : ""),
        onclick: () => s.curSongIndex = i,
      }, song?.title || "(bez názvu)"),
      button({ class: "btn btn-secondary song-remove", title: "Odstrániť z playlistu",
               onclick: () => removePlaylistItem(i) }, "×"),
    ));
}

function editField(field, placeholder) {
  return input({
    class: "form-control", type: "text", placeholder,
    value: (editingSong.val?.[field]) || "",
    oninput: e => { if (editingSong.val) editingSong.val[field] = e.target.value; },
  });
}

function infoBar() {
  return live(div, { class: "info-bar" }, () => {
    if (editing.val) {
      return [
        button({ class: "btn song-edit btn-success", onclick: saveEdit, title: "Uložiť" }, "✎ Uložiť"),
        button({ class: "btn song-create", onclick: newSong, title: "Vytvoriť novú pieseň" }, "+"),
        button({ class: "btn btn-secondary", onclick: cancelEdit, title: "Zrušiť" }, "× Zrušiť"),
        button({ class: "btn btn-danger", onclick: removeEditingSong, title: "Odstrániť pieseň" }, "🗑 Odstrániť"),
        editField("title", "názov"),
        editField("author", "autor"),
        editField("order", "poradie (napr. v1 c1 v2)"),
      ];
    }
    return [
      button({ class: "btn song-edit", onclick: editCurrent, title: "Upraviť" }, "✎"),
      button({ class: "btn song-create", onclick: newSong, title: "Vytvoriť novú pieseň" }, "+"),
      span({ class: "song-title" }, curSong.val.title || ""),
    ];
  });
}

function versesPanel() {
  return live(div, { class: "verses" }, () => {
    editorVersion.val;   // rebuild when verses are added/removed while editing
    if (editing.val) return editorVerses();
    return versesState.val.map((verse, i) =>
      p({
        class: () => "verse-item" + (s.curVerseIndex === i ? " active" : ""),
        onclick: () => s.curVerseIndex = i,
      }, verse));
  });
}

function editorVerses() {
  const verses = editingSong.val ? pickStringVerses(editingSong.val.verses) : {};
  const rows = [];
  for (const [id, html] of Object.entries(verses)) {
    rows.push(
      button({ class: "btn btn-secondary verse-remove", title: "Odstrániť verš",
               onclick: () => removeVerse(id) }, "×"),
      span({ class: "verse-id" }, id),
      editableVerseP(id, html),
    );
  }
  rows.push(
    button({ class: "btn btn-success verse-add", title: "Pridať nový verš (Ctrl+Enter)",
             onclick: addNewVerse }, "+"),
    newIdInput,
    newVerseNode,
  );
  return rows;
}

/* ════════════════════════════════════════════════════════════════
   App
   ════════════════════════════════════════════════════════════════ */

function SongsApp() {
  // filter list panel (slides over the control panel on mobile)
  const filterPanel = live(
    div,
    { class: () => "songs-filter" + (filterOpen.val ? " show" : "") },
    () => filteredSongs.val.map(songRow),
  );

  // control panel: playlist + info bar + verses (created once, reused)
  const playlistEl = live(div, { class: "playlist" }, playlistRows);
  const versesEl   = versesPanel();
  const controlPanel = live(
    div,
    { class: () => "songs-control" + (!filterOpen.val && !settingsOpen.val ? " show" : "") },
    () => [playlistEl, infoBar(), versesEl],
  );

  const settingsPanel = div(
    { class: () => "settings" + (settingsOpen.val ? " show" : "") },
    p({}, "Téma: ",
      boundSelect(() => s.bodyclass, e => s.bodyclass = e.target.value, [
        { value: "", label: "Predvolené" },
        { value: "simple-with-shadow", label: "Jednoduché s tieňom" },
      ])),
    p({}, "Import piesní vo formáte OpenLyrics (z OpenLP):",
      input({ type: "file", name: "files", multiple: true, onchange: importSongs })),
    p({},
      strong("Klávesové skratky:"), br(),
      "Šípky Hore/Dole: prepínanie medzi veršami aktuálnej piesne.", br(),
      "Šípky Vľavo/Vpravo: prepínanie medzi piesňami v playliste.", br(),
      "Enter: Zobraziť/Skryť verš.", br(),
      "Ctrl+Enter: pri úprave vloží nový verš."),
  );

  const topBar = div({ class: "input-group" },
    input({
      class: "form-control", type: "text", placeholder: "filter piesní",
      oninput: e => { songFilter.val = e.target.value; filterOpen.val = !!e.target.value; },
      onclick: () => { filterOpen.val = !filterOpen.val; },
    }),
    button({ class: "btn btn-secondary", title: "Zrušiť filter",
            onclick: () => { songFilter.val = ""; filterOpen.val = false; } }, "×"),
    button({ class: "btn btn-secondary", title: "Nastavenia",
            onclick: () => settingsOpen.val = !settingsOpen.val }, "⚙"),
  );

  const bottomBar = div({ class: "bottom-buttons" },
    button({ class: "btn btn-primary", disabled: () => s.curSongIndex <= 0,
             onclick: () => s.curSongIndex = Math.max(0, s.curSongIndex - 1) }, "← Pieseň"),
    button({ class: "btn btn-primary", disabled: () => s.curSongIndex >= playlistState.val.length - 1,
             onclick: () => s.curSongIndex = Math.min(playlistState.val.length - 1, s.curSongIndex + 1) }, "Pieseň →"),
    button({ class: () => "btn control-button " + (s.show ? "btn-danger" : "btn-success"),
             onclick: toggleShow }, () => s.show ? "Skryť" : "Zobraziť"),
    button({ class: "btn btn-primary", disabled: () => s.curVerseIndex <= 0,
             onclick: () => { s.curVerseIndex = Math.max(0, s.curVerseIndex - 1); scrollToVerse(s.curVerseIndex); } }, "↑ Verš"),
    button({ class: "btn btn-primary", disabled: () => s.curVerseIndex >= versesState.val.length - 1,
             onclick: () => { s.curVerseIndex = Math.min(versesState.val.length - 1, s.curVerseIndex + 1); scrollToVerse(s.curVerseIndex); } }, "Verš ↓"),
  );

  return div({}, topBar, filterPanel, controlPanel, settingsPanel, bottomBar);
}

/* ════════════════════════════════════════════════════════════════
   Boot
   ════════════════════════════════════════════════════════════════ */

async function main() {
  const room = location.hash.slice(1) || "demo";
  await s.connect({
    space: "songs",
    password: room,
    ...Object.fromEntries(new URLSearchParams(location.search)),
  });

  gunRoot = s.root;
  playlistNode = gunRoot?.get("playlist");

  if (!gunRoot || !window.Gun) {
    van.add(document.body, div({ style: "padding:2rem;color:#f88" },
      "Nepodarilo sa pripojiť k synchronizácii (Gun). Skontrolujte pripojenie a obnovte stránku."));
    return;
  }

  subscribeSongs();
  subscribePlaylist();
  van.add(document.body, SongsApp());
}

main();
</script>
