<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1, user-scalable=no, shrink-to-fit=no, viewport-fit=cover"/>
<meta name="HandheldFriendly" content="true" />
<meta http-equiv="X-UA-Compatible" content="ie=edge" />
<meta name="mobile-web-app-capable" content="yes" />
<title>Clock</title>
<style>
  .config {
    display: none;
    position: absolute;
    width: 100%;
    padding: .5rem 0;
    top: 0;
    left: 0;
    color: #999;
    background: rgba(80, 80, 80, .5);
    align-items: center;
    justify-content: space-evenly;
  }
  .digital-clock {
    color: white;
    font-size: 30vh;
    font-weight: 100;
    text-align: center;
  }
  .note {
    font-family: 'Segoe UI', Tahoma, Verdana, sans-serif;
    font-size: 10vh;
    color: white;
    width: 100%;
    display: block;
    text-align: center;
  }
  svg { max-width: 50vw; max-height: 50vh; }
  svg .clock-face { stroke: #333; fill: black; }
  svg .minor  { stroke: #999; stroke-width: 0.5; }
  svg .major  { stroke: #999; stroke-width: 1; }
  svg .hour   { stroke: #999; }
  svg .minute { stroke: #fff; }
  svg .second, .second-counterweight { stroke: rgb(180,0,0); }
  svg .second-counterweight { stroke-width: 2; }
  .container {
    display: flex;
    align-items: center;
    height: 100vh;
    flex-wrap: wrap;
    justify-content: space-evenly;
  }
  input { vertical-align: middle; background-color: #999; border: 0; }
  label { margin-right: 1rem; }
</style>
</head>
<body>
<script type="module">
import van from "../js/van.js";

const S = "http://www.w3.org/2000/svg";
const svgTags = van.tags(S);
const { div, span, label, input, a } = van.tags;
const { svg, circle, line, g } = svgTags;

/* ---- config (persisted in the URL hash) ---- */
const cfg = {
  showSeconds:     van.state(true),
  showCircleClock: van.state(true),
  twentyFourHours: van.state(true),
  digiClockColor:  van.state("#F0F0F0"),
  digiClockSize:   van.state("50"),
  circleClockSize: van.state("50"),
  note:            van.state(""),
};
const boolKeys = ["showSeconds", "showCircleClock", "twentyFourHours"];

// read hash once: #key=value&key=value
const params = new URLSearchParams(location.hash.slice(1) || "");
for (const [k, v] of params.entries()) {
  if (boolKeys.includes(k)) cfg[k].val = v === "1";
  else if (cfg[k]) cfg[k].val = v;
}

function updateHash() {
  const entries = [
    ["showSeconds",     cfg.showSeconds.val ? "1" : ""],
    ["showCircleClock", cfg.showCircleClock.val ? "1" : ""],
    ["twentyFourHours", cfg.twentyFourHours.val ? "1" : ""],
    ["digiClockColor",  cfg.digiClockColor.val],
    ["digiClockSize",   cfg.digiClockSize.val],
    ["circleClockSize", cfg.circleClockSize.val],
    ["note",            cfg.note.val],
  ];
  history.replaceState(null, "", "#" + new URLSearchParams(entries).toString());
}
// re-write the hash whenever any config field changes
for (const k of Object.keys(cfg)) van.derive(() => { cfg[k].val; updateHash(); });

/* ---- ticking time ---- */
const now = van.state(new Date());
setInterval(() => { now.val = new Date(); }, 84); // ~12fps

const hours   = van.derive(() => now.val.getHours());
const minutes = van.derive(() => now.val.getMinutes());
const seconds = van.derive(() => now.val.getSeconds());
const millis  = van.derive(() => now.val.getMilliseconds());

/* ---- digital clock ---- */
const digi = span({ class: "digital-clock" });
van.derive(() => {
  const h = hours.val % (cfg.twentyFourHours.val ? 24 : 12);
  const m = minutes.val, s = seconds.val;
  let txt = `${h}:${m < 10 ? "0" : ""}${m}`;
  if (cfg.showSeconds.val) txt += `:${s < 10 ? "0" : ""}${s}`;
  digi.textContent = txt;
});
van.derive(() => { digi.style.color = cfg.digiClockColor.val; });
van.derive(() => { digi.style.fontSize = `${cfg.digiClockSize.val}vh`; });

/* ---- analog (SVG) clock ---- */
const clockSvg = svg({ viewBox: "-50 -50 100 100" },
  circle({ class: "clock-face", r: "48" }),
  // 12 major markers (every 5 minutes), each with 4 minor ticks
  [0, 5, 10, 15, 20, 25, 30, 35, 40, 45, 50, 55].flatMap(minute => [
    line({ class: "major", y1: "35", y2: "45", transform: `rotate(${30 * minute})` }),
    ...[1, 2, 3, 4].map(off =>
      line({ class: "minor", y1: "42", y2: "45", transform: `rotate(${6 * (minute + off)})` })),
  ]),
  line({ class: "hour",   y1: "2",  y2: "-20", id: "hourHand" }),
  line({ class: "minute", y1: "4",  y2: "-30", id: "minHand" }),
  g({ id: "secHand" },
    line({ class: "second", y1: "10", y2: "-38" }),
    line({ class: "second-counterweight", y1: "10", y2: "2" })),
);
const hourHand = clockSvg.querySelector("#hourHand");
const minHand  = clockSvg.querySelector("#minHand");
const secHand  = clockSvg.querySelector("#secHand");
van.derive(() => { hourHand.setAttribute("transform", `rotate(${30 * hours.val + minutes.val / 2})`); });
van.derive(() => { minHand.setAttribute("transform",  `rotate(${6 * minutes.val + seconds.val / 10})`); });
van.derive(() => { secHand.setAttribute("transform",  `rotate(${6 * (seconds.val + millis.val / 1000)})`); });
van.derive(() => {
  clockSvg.style.maxWidth  = `${cfg.circleClockSize.val}vw`;
  clockSvg.style.maxHeight = `${cfg.circleClockSize.val}vh`;
});

/* ---- note ---- */
const noteEl = div({ class: "note" });
van.derive(() => {
  const n = cfg.note.val.trim();
  noteEl.textContent = n;
  noteEl.style.display = n ? "block" : "none";
});

/* ---- config bar ---- */
const showConfig = van.state(false);
const onCheckbox = (key) => (e) => { cfg[key].val = e.target.checked; };
const onInput    = (key) => (e) => { cfg[key].val = e.target.value; };

const circleSizeLabel = label({ style: () => cfg.showCircleClock.val ? "" : "display:none;" },
  "Size:",
  input({ type: "range", min: "1", max: "100",
          value: () => cfg.circleClockSize.val, oninput: onInput("circleClockSize") }));

const configBar = div({ class: "config" },
  label({}, "Color: ",
    input({ type: "color", value: () => cfg.digiClockColor.val, oninput: onInput("digiClockColor") })),
  label({}, input({ type: "checkbox", checked: () => cfg.showSeconds.val, onchange: onCheckbox("showSeconds") }), "seconds"),
  label({}, input({ type: "checkbox", checked: () => cfg.twentyFourHours.val, onchange: onCheckbox("twentyFourHours") }), "24h"),
  label({}, "Size: ",
    input({ type: "range", min: "1", max: "100",
            value: () => cfg.digiClockSize.val, oninput: onInput("digiClockSize") })),
  label({}, input({ type: "checkbox", checked: () => cfg.showCircleClock.val, onchange: onCheckbox("showCircleClock") }), "clock"),
  // circle-clock size only matters when the circle is shown (toggled via style above)
  circleSizeLabel,
  label({}, "Note: ",
    input({ type: "input", value: () => cfg.note.val, oninput: onInput("note") })),
  a({ href: "/countdown/", style: "color:#ccf" }, "countdown"),
);
van.derive(() => { configBar.style.display = showConfig.val ? "flex" : "none"; });

/* ---- assemble ---- */
const container = div({ class: "container", onclick: () => { showConfig.val = !showConfig.val; } });
van.derive(() => {
  container.replaceChildren();
  container.append(digi);
  if (cfg.showCircleClock.val) container.append(clockSvg);
  if (cfg.note.val.trim()) container.append(noteEl);
});

van.add(document.body, container, configBar);
</script>
</body>
</html>
